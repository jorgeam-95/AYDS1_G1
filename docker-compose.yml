version: "3.9"

services:
  db:
    image: postgres:15
    container_name: postgres_saludplus
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - saludplus_network

  backend:
    build:
      context: ./backend
    container_name: fastapi_saludplus
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: ${DATABASE_URL}
      POSTGRES_HOST: db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: ${POSTGRES_PORT}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    networks:
      - saludplus_network

  frontend:
    build:
      context: ./frontend
    container_name: react_saludplus
    restart: always
    depends_on:
      - backend
    ports:
      - "5173:80"
    networks:
      - saludplus_network

volumes:
  postgres_data:

networks:
  saludplus_network:
    driver: bridge